<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>預言家日報・防窺工坊</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

  <meta name="theme-color" content="#8a2d2d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="防窺工坊" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root {
      --paper: #EFE2C4;
      --paper-deep: #E4D2A8;
      --ink: #3A2A17;
      --wine: #8a2d2d;
      --wine-dark: #6f2424;
      --gold: #C2A867;
      --shadow: rgba(58, 42, 23, 0.22);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--paper);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
    }

    body {
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    .frame-wrap {
      position: fixed;
      inset: env(safe-area-inset-top) 0 0 0;
      width: 100%;
      height: calc(100% - env(safe-area-inset-top));
      background: var(--paper);
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .frame-wrap.ready {
      opacity: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--paper);
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(24px + env(safe-area-inset-top)) 24px calc(24px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 50% 28%, rgba(255, 247, 220, 0.72), transparent 34%),
        linear-gradient(135deg, #F3E6C8 0%, #E7D4A8 48%, #D9BE86 100%);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-card {
      width: min(82vw, 360px);
      padding: 30px 22px 26px;
      border: 1px solid rgba(122, 85, 42, 0.28);
      border-radius: 28px;
      background: rgba(239, 226, 196, 0.72);
      box-shadow: 0 20px 60px rgba(58, 42, 23, 0.22);
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .app-icon {
      width: 112px;
      height: 112px;
      border-radius: 26px;
      object-fit: cover;
      box-shadow:
        0 14px 30px rgba(58, 42, 23, 0.26),
        inset 0 0 0 1px rgba(255,255,255,0.24);
      margin-bottom: 18px;
    }

    .app-title {
      margin: 0;
      font-size: 30px;
      line-height: 1.14;
      font-weight: 850;
      letter-spacing: 0.03em;
      color: var(--ink);
    }

    .app-title span {
      display: block;
    }

    .app-subtitle {
      margin: 12px 0 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(58, 42, 23, 0.72);
    }

    .loader {
      width: 34px;
      height: 34px;
      margin: 22px auto 0;
      border-radius: 50%;
      border: 3px solid rgba(122, 45, 38, 0.18);
      border-top-color: var(--wine);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .fallback {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 30;
      display: none;
      padding: 14px 44px 14px 16px;
      border: 1px solid rgba(122, 85, 42, 0.22);
      border-radius: 18px;
      background: rgba(239, 226, 196, 0.96);
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.45;
      touch-action: pan-y;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .fallback.show {
      display: block;
    }

    .fallback.dismissed {
      transform: translateY(140%);
      opacity: 0;
      pointer-events: none;
    }

    .fallback-title {
      font-weight: 750;
      margin-bottom: 4px;
    }

    .fallback a {
      color: var(--wine-dark);
      font-weight: 750;
      text-decoration: none;
    }

    .fallback-actions {
      margin-top: 8px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .fallback-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(138, 45, 45, 0.10);
    }

    .fallback-close {
      position: absolute;
      top: 8px;
      right: 12px;
      border: 0;
      background: transparent;
      color: var(--wine-dark);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    @media (max-width: 430px) {
      .splash-card {
        width: min(84vw, 330px);
        padding: 28px 20px 24px;
      }

      .app-icon {
        width: 104px;
        height: 104px;
        border-radius: 24px;
      }

      .app-title {
        font-size: 28px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .frame-wrap,
      .splash,
      .fallback {
        transition: none;
      }

      .loader {
        animation: none;
      }
    }
  </style>
</head>

<body>
  <div class="splash" id="splash" aria-live="polite">
    <div class="splash-card">
      <img class="app-icon" src="./apple-touch-icon.png" alt="防窺工坊 icon" />
      <h1 class="app-title">
        <span>預言家日報</span>
        <span>防窺工坊</span>
      </h1>
      <p class="app-subtitle">正在展開卷軸，請稍候…</p>
      <div class="loader" aria-hidden="true"></div>
    </div>
  </div>

  <div class="frame-wrap" id="frameWrap">
    <iframe
      id="appFrame"
      src="https://ai-ocr-protector.streamlit.app/?embed=true"
      title="預言家日報・防窺工坊"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>

  <div class="fallback" id="fallback">
    <button class="fallback-close" id="fallbackClose" aria-label="關閉提示">×</button>
    <div class="fallback-title">卷軸暫時沒有展開</div>
    <div>如果畫面一直沒有載入，可以直接開啟原網站。</div>
    <div class="fallback-actions">
      <a class="fallback-action" href="https://ai-ocr-protector.streamlit.app/" target="_blank" rel="noopener">直接開啟防窺工坊</a>
      <a class="fallback-action" href="./">重新載入</a>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      });
    }

    const iframe = document.getElementById("appFrame");
    const frameWrap = document.getElementById("frameWrap");
    const splash = document.getElementById("splash");
    const fallback = document.getElementById("fallback");
    const fallbackClose = document.getElementById("fallbackClose");

    let iframeLoaded = false;
    let fallbackDismissed = false;

    function hideSplash() {
      frameWrap.classList.add("ready");
      splash.classList.add("hidden");
    }

    iframe.addEventListener("load", () => {
      iframeLoaded = true;
      setTimeout(hideSplash, 450);
    });

    function showFallback() {
      if (!iframeLoaded && !fallbackDismissed) {
        fallback.classList.add("show");
      }
    }

    function dismissFallback() {
      fallbackDismissed = true;
      fallback.classList.add("dismissed");

      setTimeout(() => {
        fallback.classList.remove("show");
        fallback.classList.remove("dismissed");
      }, 250);
    }

    fallbackClose.addEventListener("click", dismissFallback);

    let touchStartY = null;

    fallback.addEventListener("touchstart", (event) => {
      touchStartY = event.touches[0].clientY;
    });

    fallback.addEventListener("touchend", (event) => {
      if (touchStartY === null) return;

      const touchEndY = event.changedTouches[0].clientY;
      const deltaY = touchEndY - touchStartY;

      if (deltaY > 40) {
        dismissFallback();
      }

      touchStartY = null;
    });

    setTimeout(showFallback, 7000);

    setTimeout(() => {
      if (!iframeLoaded) {
        splash.querySelector(".app-subtitle").textContent = "載入時間較長，仍在嘗試展開卷軸…";
      }
    }, 4500);
  </script>
</body>
</html>
