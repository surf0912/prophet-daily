<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a0a00" />
  <title>預言家日報</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" href="./favicon.png" />
  <style>
    /* ── Magic fonts ── */
    @font-face {
      font-family: 'YuseiMagic';
      src: url('./uifont.woff2') format('woff2');
      font-display: swap;
      /* Latin/digits + UI arrows/dingbats only. CJK and general punctuation (incl. “” ‘’ — …)
         fall through to 粉圓 (HuninnUI) so they render consistently and completely. */
      unicode-range: U+0000-00FF, U+2190-21FF, U+2700-27BF;
    }
    @font-face {
      font-family: 'HuninnUI';
      src: url('./uifont-fallback.woff2') format('woff2');
      font-display: swap;
    }

    /* ── Design tokens ── */
    :root {
      --parchment:  #f4e8c1;
      --parchment2: #efe2c4;
      --ink:        #1a0a00;
      --ink-light:  #3d1f0d;
      --scarlet:    #8a2d2d;
      --scarlet-dk: #5c1a1a;
      --gold:       #c9a84c;
      --gold-lt:    #e8d5a3;
      --shadow:     rgba(26,10,0,0.35);
      --nav-h:      50px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      /* Pull the icons closer to the bottom: trim the home-indicator gap (keep ~8px clearance).
         The brown body fills the area behind the bar, so the bottom stays seamless. */
      --nav-safe: max(8px, calc(env(safe-area-inset-bottom, 0px) - 18px));
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; overscroll-behavior: none; width: 100%; max-width: 100%; position: fixed; inset: 0; }
    body { background: var(--ink-light); color: var(--parchment); touch-action: manipulation; }
    /* Disable Safari/iOS double-tap-to-zoom everywhere (keeps scroll + pinch). */
    * { touch-action: manipulation; }

    /* ── Font toggle (auth overlay) ── */
    .font-toggle-btn {
      position: absolute; top: 14px; left: 16px;
      background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,.4);
      border-radius: 20px; padding: 6px 14px;
      color: var(--gold-lt); font-size: 13px; cursor: pointer;
      transition: background .2s; letter-spacing: .04em;
    }
    .font-toggle-btn:hover { background: rgba(201,168,76,.25); }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100%; overflow: hidden; width: 100%; max-width: 100%; }
    #page-area { flex: 1; overflow-y: auto; overflow-x: hidden; background: var(--parchment); color: var(--ink); padding-top: env(safe-area-inset-top, 0px); padding-bottom: calc(var(--nav-h) + var(--nav-safe)); }
    /* Home page is fixed-height: lock scrolling entirely (no scroll, no scrollbar) */
    #page-area:has(#page-home.active) { overflow: hidden; overscroll-behavior: none; touch-action: none; }
    #page-area::-webkit-scrollbar { width: 0; height: 0; }

    /* ── Nav bar ── */
    nav {
      display: flex; align-items: stretch;
      background: var(--ink-light);
      border-top: 2px solid var(--gold);
      height: calc(var(--nav-h) + var(--nav-safe));
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--gold-lt); font-size: 9px; letter-spacing: 0.04em;
      transition: color .2s, background .2s; padding: 6px 2px var(--nav-safe);
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn .icon { font-size: 22px; line-height: 1; }
    .nav-btn.active { color: var(--gold); background: rgba(201,168,76,.08); }
    .nav-btn:active { opacity: .7; }

    /* ── Pages ── */
    .page { display: none; min-height: 100%; padding: 0 0 80px; }
    .page.active { display: block; }
    /* App-wide UI scale (settings page). Home is locked, so it never scales. */
    .page:not(#page-home) { zoom: var(--app-zoom, 1); }
    /* No horizontal swipe on any of our own pages (the 防窺 iframe keeps its own gestures). */
    .page:not(#page-protect), .page:not(#page-protect) * { touch-action: pan-y; }
    #page-home { display: none; flex-direction: column; padding: 0; min-height: unset; height: 100%; overflow: hidden; }
    #page-home.active { display: flex; }
    #page-home .greeting-hero { flex: 1; max-height: unset; aspect-ratio: unset; }

    /* ── Auth overlay ── */
    #auth-overlay {
      position: fixed; inset: 0; z-index: 100;
      background-color: #2F2114;
      background-image:
        linear-gradient(rgba(47,33,20,0.72), rgba(47,33,20,0.72)),
        url('./parchment.jpg');
      background-size: 100% 100%, cover;
      background-position: center, center;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0;
    }
    .auth-box {
      width: calc(100% - 32px); max-width: 400px; padding: 36px 28px;
      background: rgba(47,33,20,0.82);
      border: 1px solid var(--gold);
      border-radius: 6px;
      position: relative;
    }
    @media (min-width: 640px) {
      .auth-box { max-width: 580px; padding: 56px 64px; }
      .auth-logo { margin-bottom: 40px; }
      .field { margin-bottom: 24px; }
      .field input { padding: 14px 16px; font-size: 17px; }
      .btn-primary { padding: 16px; font-size: 17px; }
    }
    .auth-logo { text-align: center; margin-bottom: 28px; padding-top: 32px; }
    .auth-logo h1 {
      color: var(--gold); letter-spacing: .06em;
      font-size: clamp(32px, 6vw, 60px); font-weight: 400;
      line-height: 1.15;
    }
    .auth-logo .subtitle { color: var(--gold-lt); font-size: 13px; margin-top: 8px; letter-spacing: .14em; }
    .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--gold); }
    .auth-tab {
      flex: 1; padding: 8px; text-align: center; cursor: pointer;
      color: var(--gold-lt); font-size: 13px; border: none; background: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s;
    }
    .auth-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 8px; letter-spacing: .06em; }
    .field input {
      width: 100%; padding: 10px 12px; background: rgba(255,255,255,.07);
      border: 1px solid rgba(201,168,76,.4); border-radius: 3px;
      color: var(--parchment); font-size: 15px; outline: none;
    }
    .field input:focus { border-color: var(--gold); }
    .btn-primary {
      width: 100%; padding: 12px; background: var(--scarlet);
      border: 1px solid var(--scarlet-dk); border-radius: 3px;
      color: var(--parchment); font-size: 15px; cursor: pointer;
      letter-spacing: .05em; transition: opacity .2s;
    }
    .btn-primary:hover { opacity: .85; }
    .auth-msg { text-align: center; margin-top: 12px; font-size: 12px; color: var(--gold-lt); min-height: 18px; }

    /* ── Home page ── */
    .greeting-hero {
      background: linear-gradient(160deg, #4a1d1d 0%, #2a1408 100%) center / cover no-repeat;
      width: 100%; aspect-ratio: 3/4; max-height: 72vh;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .greeting-hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(to bottom, transparent, rgba(26,10,0,0.55));
    }
    .greeting-hero .char-emoji {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: clamp(72px, 22vw, 180px); opacity: .92;
      filter: drop-shadow(0 4px 14px rgba(0,0,0,.45));
    }
    .greeting-hero h2, .greeting-hero p { display: none; }
    .greeting-text {
      background: var(--ink-light); text-align: center;
      padding: 12px 20px 10px; flex-shrink: 0;
    }
    .greeting-text h2 { color: var(--gold); font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .greeting-text p { color: var(--parchment2); font-size: 12px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .date-banner {
      background: var(--ink-light); color: var(--gold-lt);
      text-align: center; padding: 8px; font-size: 11px; letter-spacing: .08em;
    }
    .home-section { padding: 20px 18px; }
    .home-section h3 { font-size: 13px; color: var(--scarlet); letter-spacing: .1em; margin-bottom: 12px; border-bottom: 1px solid var(--gold-lt); padding-bottom: 4px; }
    .novel-card-sm {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid rgba(26,10,0,.1); cursor: pointer;
    }
    .novel-card-sm .cover {
      width: 44px; height: 60px; background: var(--scarlet);
      border-radius: 2px; flex-shrink: 0; object-fit: cover;
      display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px;
    }
    .novel-card-sm .info h4 { font-size: 14px; }
    .novel-card-sm .info p { font-size: 11px; color: var(--ink-light); margin-top: 2px; }

    /* ── Scroll (卷軸) page ── */
    .shelf-header { padding: 20px 18px 8px; background: var(--parchment2); border-bottom: 2px solid var(--gold-lt); }
    .shelf-header h2 { font-size: 18px; color: var(--ink); }
    .novel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; padding: 18px; }
    .novel-card {
      cursor: pointer; border-radius: 4px; overflow: hidden;
      box-shadow: 0 2px 10px var(--shadow); transition: transform .2s;
    }
    .novel-card:active { transform: scale(.97); }
    .novel-card .cover-big {
      height: 190px; background: linear-gradient(135deg, var(--scarlet-dk), var(--scarlet));
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; color: var(--gold);
    }
    .novel-card img.cover-big { height: 190px; width: 100%; object-fit: cover; }
    .novel-card .meta { padding: 8px 10px; background: var(--parchment2); }
    .novel-card .meta h4 { font-size: 13px; color: var(--ink); line-height: 1.3; }
    .novel-card .meta p { font-size: 11px; color: var(--ink-light); margin-top: 2px; }
    .novel-card .meta p.upd { color: var(--scarlet); font-size: 10px; margin-top: 4px; }
    .empty-shelf { text-align: center; padding: 60px 24px; color: var(--ink-light); width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* ── Reader ── */
    #reader-view {
      display: none; position: fixed; inset: 0; z-index: 50;
      background:
        linear-gradient(rgba(244,232,193,0.80), rgba(244,232,193,0.80)),
        url('./parchment.jpg');
      background-size: cover; background-position: center; background-attachment: fixed;
      overflow-y: auto; overflow-x: hidden; overscroll-behavior: none;
      touch-action: pan-y; flex-direction: column;
    }
    #reader-view.open { display: flex; }
    #reader-view, .reader-content { max-width: 100%; }
    .reader-content { touch-action: pan-y; }
    .reader-content { overflow-wrap: anywhere; word-break: break-word; }
    .reader-header {
      position: sticky; top: 0; background: var(--ink); color: var(--gold);
      padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 12px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--gold); z-index: 5;
    }
    .reader-header > button { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; }
    .reader-header h3 { flex: 1; font-size: 15px; }
    .reader-font-ctrl { display: flex; align-items: center; gap: 8px; }
    .reader-font-ctrl button {
      background: rgba(201,168,76,.15); border: 1px solid var(--gold);
      color: var(--gold); font-size: 13px; padding: 4px 9px; border-radius: 4px; cursor: pointer;
    }
    .reader-font-ctrl span { color: var(--gold-lt); font-size: 12px; min-width: 18px; text-align: center; }
    .reader-content { padding: 24px 20px 100px; font-size: var(--reader-font, 17px); line-height: 2; color: var(--ink); user-select: none; }
    .reader-content p { font-size: inherit; }
    /* ── Forum post layout (post body separated from comments) ── */
    .fp-intro {
      background: rgba(138,45,45,.06); border-left: 3px solid var(--scarlet);
      border-radius: 0 6px 6px 0; padding: 14px 16px; margin-bottom: 8px; line-height: 1.7;
    }
    .fp-intro p { margin-bottom: 8px; }
    .fp-intro p:last-child { margin-bottom: 0; }
    .fp-divider { text-align: center; color: var(--ink-light); font-size: .8em; letter-spacing: .3em; margin: 18px 0 22px; opacity: .6; }
    .fp-comment { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(26,10,0,.12); }
    .fp-comment:last-child { border-bottom: none; }
    .fp-comment .fp-name {
      display: inline-block; font-weight: bold; color: var(--scarlet);
      font-size: .9em; background: rgba(201,168,76,.18); padding: 2px 10px;
      border-radius: 12px; margin-bottom: 6px; line-height: 1.5;
    }
    .fp-comment .fp-body { line-height: 1.75; padding-left: 2px; }
    .fp-comment .fp-body p { margin-bottom: 2px; }
    /* Fixed "post sealed" box appended to the end of every forum post */
    .fp-end {
      margin: 30px 2px 8px; padding: 18px 16px; text-align: center;
      border: 1px dashed var(--scarlet); border-radius: 8px;
      background: rgba(138,45,45,.05);
    }
    .fp-end .fp-end-title { color: var(--scarlet); font-weight: bold; font-size: .95em; margin-bottom: 10px; letter-spacing: .06em; }
    .fp-end p { font-size: .8em; line-height: 1.8; color: var(--ink-light); margin: 0; }
    .watermark-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 4;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent 0px, transparent 80px,
        rgba(138,45,45,0.04) 80px, rgba(138,45,45,0.04) 82px
      );
    }
    .chapter-nav { display: flex; justify-content: space-between; padding: 16px 20px; border-top: 1px solid var(--gold-lt); background: var(--parchment2); }
    .chapter-nav button { padding: 8px 16px; background: var(--scarlet); color: var(--parchment); border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
    .chapter-nav button:disabled { opacity: .4; cursor: default; }
    .chapter-list-panel { padding: 12px 18px; background: var(--parchment2); border-bottom: 1px solid var(--gold-lt); }
    .chapter-list-panel details summary { cursor: pointer; font-size: 13px; color: var(--scarlet); }
    .chapter-list-panel ol { margin: 8px 0 0 18px; font-size: 13px; }
    .chapter-list-panel ol li { padding: 4px 0; cursor: pointer; color: var(--ink-light); }
    .chapter-list-panel ol li:hover { color: var(--scarlet); }
    .chapter-list-panel ol li.current { color: var(--scarlet); font-weight: bold; }

    /* ── Forum page ── */
    .forum-header { padding: 20px 18px 8px; border-bottom: 2px solid var(--gold-lt); }
    .forum-header h2 { font-size: 18px; }
    .forum-search { padding: 12px 18px; }
    .forum-search input {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--gold-lt); border-radius: 20px;
      background: var(--parchment2); color: var(--ink); font-size: 14px; outline: none;
    }
    .forum-search input:focus { border-color: var(--gold); }
    .forum-list { padding: 0 18px 18px; }
    .forum-post-row {
      padding: 14px 4px; border-bottom: 1px solid rgba(26,10,0,.1); cursor: pointer;
    }
    .forum-post-row:active { background: rgba(201,168,76,.08); }
    .forum-post-row h4 { font-size: 15px; color: var(--ink); line-height: 1.35; }
    .forum-post-row .meta { font-size: 11px; color: var(--ink-light); margin-top: 5px; display: flex; gap: 10px; }
    .forum-post-row .pending-tag { color: var(--scarlet); }
    .comment-thread { padding: 0 18px; }
    .comment-item { padding: 12px 0; border-bottom: 1px solid rgba(26,10,0,.08); }
    .comment-item .c-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .comment-item .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--scarlet); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 12px; flex-shrink: 0; }
    .comment-item .c-name { font-size: 12px; font-weight: bold; color: var(--scarlet); }
    .comment-item .c-time { font-size: 11px; color: #888; }
    .comment-item .c-body { font-size: 14px; line-height: 1.6; padding-left: 36px; }
    .comment-item .c-actions { padding-left: 36px; margin-top: 4px; display: flex; gap: 12px; }
    .comment-item .c-actions button { background: none; border: none; font-size: 11px; color: #888; cursor: pointer; padding: 2px 0; }
    .comment-item .c-actions button:hover { color: var(--scarlet); }
    .comment-item.reply { padding-left: 36px; }
    .comment-box { padding: 16px 18px; border-top: 1px solid var(--gold-lt); background: var(--parchment2); position: sticky; bottom: 0; }
    .comment-box textarea {
      width: 100%; padding: 10px; border: 1px solid var(--gold-lt); border-radius: 3px;
      font-size: 14px; resize: none; min-height: 60px; background: var(--parchment);
    }
    .comment-box .box-actions { display: flex; justify-content: flex-end; margin-top: 8px; gap: 8px; }
    .comment-box .box-actions button { padding: 6px 16px; border-radius: 3px; font-size: 13px; cursor: pointer; border: none; }
    .btn-cancel { background: transparent; border: 1px solid var(--gold-lt) !important; color: var(--ink-light); }
    .btn-post { background: var(--scarlet); color: var(--parchment); }

    /* ── Protect page (embeds the standalone 防窺工坊 Streamlit app) ── */
    #page-protect { padding: 0; }
    #protect-frame { display: block; width: 100%; height: calc(100dvh - var(--nav-h) - var(--safe-bottom)); border: 0; background: #EFE2C4; }
    .protect-header { padding: 20px 18px 8px; border-bottom: 2px solid var(--gold-lt); }
    .protect-header h2 { font-size: 18px; }
    .protect-body { padding: 20px 18px; }
    .protect-drop {
      border: 2px dashed var(--gold-lt); border-radius: 6px;
      padding: 40px 20px; text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .protect-drop:hover, .protect-drop.drag-over { border-color: var(--gold); background: rgba(201,168,76,.05); }
    .protect-drop .drop-icon { font-size: 48px; }
    .protect-drop p { margin-top: 10px; font-size: 14px; color: var(--ink-light); }
    .preset-row { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
    .preset-btn {
      padding: 7px 14px; border-radius: 20px; font-size: 12px;
      border: 1px solid var(--gold-lt); background: transparent;
      color: var(--ink); cursor: pointer; transition: all .2s;
    }
    .preset-btn.active { background: var(--scarlet); border-color: var(--scarlet); color: #fff; }
    .protect-preview { margin-top: 16px; display: none; }
    .protect-preview img { width: 100%; border-radius: 4px; border: 1px solid var(--gold-lt); }
    .protect-preview .dl-btn { display: block; width: 100%; margin-top: 10px; padding: 12px; text-align: center; background: var(--scarlet); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
    .progress-bar { height: 4px; background: var(--gold-lt); border-radius: 2px; overflow: hidden; margin: 12px 0; display: none; }
    .progress-bar .fill { height: 100%; background: var(--scarlet); width: 0; transition: width .3s; }

    /* ── Settings page ── */
    .settings-header { padding: 20px 18px 8px; border-bottom: 2px solid var(--gold-lt); }
    .settings-header h2 { font-size: 18px; }
    .settings-body { padding: 20px 18px; }
    .settings-section { margin-bottom: 28px; }
    .settings-section h3 { font-size: 12px; color: var(--scarlet); letter-spacing: .1em; margin-bottom: 12px; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(26,10,0,.07); }
    .settings-row label { font-size: 14px; }
    .settings-row select { padding: 6px 10px; border: 1px solid var(--gold-lt); border-radius: 3px; font-size: 13px; background: var(--parchment2); }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 24px; cursor: pointer; transition: background .3s; }
    .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform .3s; }
    .toggle input:checked + .slider { background: var(--scarlet); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .profile-box { text-align: center; padding: 20px 0; }
    .profile-box .avatar-lg { width: 72px; height: 72px; border-radius: 50%; background: var(--scarlet); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 32px; margin: 0 auto 10px; }
    .profile-box h3 { font-size: 18px; }
    .profile-box p { font-size: 12px; color: var(--ink-light); margin-top: 2px; }
    .btn-logout { display: block; width: 100%; padding: 12px; background: transparent; border: 1px solid var(--scarlet); color: var(--scarlet); border-radius: 3px; font-size: 14px; cursor: pointer; margin-top: 20px; }

    /* ── Admin page ── */
    .admin-header { padding: 20px 18px 8px; border-bottom: 2px solid var(--gold-lt); }
    .admin-header h2 { font-size: 18px; }
    .admin-tabs { display: flex; border-bottom: 1px solid var(--gold-lt); background: var(--parchment2); }
    .admin-tab { flex: 1; padding: 10px; text-align: center; font-size: 12px; cursor: pointer; border: none; background: none; color: var(--ink-light); border-bottom: 2px solid transparent; }

    .btn-close-modal { display: block; width: 100%; margin-top: 16px; padding: 12px; background: var(--ink); color: var(--gold); border: none; border-radius: 3px; cursor: pointer; }

    /* ── Loading spinner ── */
    .spinner { display: flex; justify-content: center; padding: 40px; }
    .spinner::after {
      content: ''; width: 36px; height: 36px; border: 3px solid var(--gold-lt);
      border-top-color: var(--scarlet); border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px); left: 50%;
      transform: translateX(-50%) translateY(20px); opacity: 0;
      background: var(--ink); color: var(--gold); padding: 10px 20px;
      border-radius: 20px; font-size: 13px; border: 1px solid var(--gold);
      transition: opacity .3s, transform .3s; z-index: 999; white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<script>
// ── Config (update after deploy) ────────────────────────────
const API = 'https://ai-ocr-protector.onrender.com';

// ── Font toggle ───────────────────────────────────────────────
let magicFont = localStorage.getItem('pd_magic_font') !== 'off';

const MAGIC_FONT_CSS = `
html, body, *, *::before, *::after,
input, button, textarea, select, option, label,
h1, h2, h3, h4, h5, h6, p, span, div, a, li, td, th {
  font-family: 'YuseiMagic', 'HuninnUI', 'PingFang SC', 'PingFang TC', 'Heiti SC', sans-serif !important;
}
input::placeholder, textarea::placeholder {
  font-family: 'YuseiMagic', 'HuninnUI', 'PingFang SC', 'PingFang TC', 'Heiti SC', sans-serif !important;
}`;

const SYSTEM_FONT_CSS = `
html, body, *, *::before, *::after,
input, button, textarea, select, option, label,
h1, h2, h3, h4, h5, h6, p, span, div, a, li, td, th {
  font-family: system-ui, -apple-system, "PingFang TC", "Microsoft YaHei", sans-serif !important;
}
input::placeholder, textarea::placeholder {
  font-family: system-ui, -apple-system, "PingFang TC", "Microsoft YaHei", sans-serif !important;
}`;

function applyFont() {
  let el = document.getElementById('dynamic-font-style');
  if (!el) {
    el = document.createElement('style');
    el.id = 'dynamic-font-style';
    document.head.appendChild(el);
  }
  el.textContent = magicFont ? MAGIC_FONT_CSS : SYSTEM_FONT_CSS;
  const btn = document.getElementById('font-toggle-btn');
  if (btn) btn.textContent = magicFont ? '✦ 魔法字體' : '✦ 系統字體';
}

function toggleFont() {
  magicFont = !magicFont;
  localStorage.setItem('pd_magic_font', magicFont ? 'on' : 'off');
  applyFont();
}

applyFont();

// ── State ────────────────────────────────────────────────────
let token = localStorage.getItem('pd_token') || null;
let currentUser = null;
let novels = [];
let currentNovelId = null;
let currentChapters = [];
let currentChapterIdx = 0;
let replyToId = null;
let currentForumChapterId = null;
let protectPreset = 'standard';

// ── API helper ───────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { doLogout(); return null; }
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.detail || 'Request failed');
  }
  return res.json();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function initials(name) { return name ? name[0].toUpperCase() : '?'; }

// ── Auth ─────────────────────────────────────────────────────
function showLoginForm() {
  document.getElementById('signin-form').style.display = '';
  document.getElementById('invite-form').style.display = 'none';
  document.getElementById('invite-invalid').style.display = 'none';
  document.getElementById('auth-msg').textContent = '';
}

async function doSignIn() {
  const msg = document.getElementById('auth-msg');
  msg.textContent = '驗證中…';
  try {
    const username = document.getElementById('si-username').value.trim();
    if (!username) { msg.textContent = '請輸入用戶名稱'; return; }
    const res = await api('/auth/signin', {
      method: 'POST',
      body: JSON.stringify({ username, password: document.getElementById('si-pass').value }),
    });
    if (!res) return;
    token = res.access_token;
    localStorage.setItem('pd_token', token);
    const url = new URL(window.location.href);
    url.searchParams.delete('invite');
    history.replaceState({}, '', url);
    await initApp();
  } catch (e) { msg.textContent = '⚠️ ' + e.message; }
}

async function doInviteRegister() {
  const msg = document.getElementById('auth-msg');
  const username = document.getElementById('inv-name').value.trim();
  const pass = document.getElementById('inv-pass').value;
  const invToken = new URLSearchParams(window.location.search).get('invite');
  if (!username) { msg.textContent = '請輸入巫師名'; return; }
  if (!/^[a-zA-Z0-9_]{2,20}$/.test(username)) { msg.textContent = '⚠️ 只能用英文、數字、底線，2-20字'; return; }
  if (!invToken) { msg.textContent = '找不到邀請令牌'; return; }
  msg.textContent = '建立帳號中…';
  try {
    await api('/invites/register', {
      method: 'POST',
      body: JSON.stringify({ token: invToken, username, password: pass }),
    });
    const url = new URL(window.location.href);
    url.searchParams.delete('invite');
    history.replaceState({}, '', url);
    document.getElementById('si-username').value = username;
    showLoginForm();
    msg.textContent = '✅ 帳號建立成功，請登入';
  } catch (e) { msg.textContent = '⚠️ ' + e.message; }
}

function doLogout() {
  token = null; currentUser = null;
  localStorage.removeItem('pd_token');
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  showLoginForm();
}

async function initApp() {
  try { currentUser = await api('/auth/me'); } catch { doLogout(); return; }
  if (!currentUser) return;
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  if (['writer', 'admin', 'super_admin'].includes(currentUser.role)) document.getElementById('admin-nav-btn').style.display = '';
  if (currentUser.role === 'writer') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  renderSettings();
  renderGreeting();
  loadNovels();
}

function renderGreeting() {
  const h = new Date().getHours();
  // 時段 index：0=早上(5-11) 1=中午(12-13) 2=下午(14-17) 3=晚上/深夜(18-4)
  const timeIdx = h >= 5 && h < 12 ? 0 : h >= 12 && h < 14 ? 1 : h >= 14 && h < 18 ? 2 : 3;
  const period = h < 5 ? '深夜好' : h < 12 ? '早安' : h < 18 ? '午安' : '晚安';
  const char = CHARS[Math.floor(Math.random() * CHARS.length)];
  const hero = document.getElementById('greeting-hero');
  const emoji = document.getElementById('char-emoji');
  const GRAD = 'linear-gradient(160deg, #4a1d1d 0%, #2a1408 100%)';
  emoji.textContent = char.emoji;
  emoji.style.display = '';            // show emoji over the gradient (fallback)
  hero.style.backgroundImage = GRAD;   // gradient base — never let parchment show through
  document.getElementById('greeting-line-text').textContent = `${period}，${currentUser.username || '你'} ✨`;
  document.getElementById('greeting-quote-text').textContent = char.quotes[timeIdx];
  if (char.img) {
    const probe = new Image();         // only swap in the photo once it actually loads
    probe.onload = () => {             // photo layered OVER the gradient (gradient stays as fallback)
      hero.style.backgroundImage = `url('${char.img}'), ${GRAD}`;
      hero.style.backgroundPosition = `${char.bgPos || 'center'}, center`;
      hero.style.backgroundRepeat = 'no-repeat, no-repeat';
      hero.style.backgroundSize = `${char.bgSize || 'cover'}, cover`;
      emoji.style.display = 'none';
    };
    probe.onerror = () => {};          // keep emoji + gradient if the photo fails
    probe.src = char.img;
  }
  const now = new Date();
  document.getElementById('date-banner').textContent =
    `📰 ${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日 · 巫師界頭條`;
}

function fmtUpdated(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return '';
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// ── Reader ───────────────────────────────────────────────────
let currentNovelKind = 'novel';
let currentNovelTitle = '';

async function openNovel(novelId) {
  currentNovelId = novelId;
  let novel = [...forumPosts, ...novels].find(n => n.id === novelId);
  if (!novel) { try { novel = await api(`/novels/${novelId}`); } catch {} }
  currentNovelKind = (novel && novel.kind) || 'novel';
  currentNovelTitle = (novel && novel.title) || '';
  try { currentChapters = await api(`/chapters/novel/${novelId}`) || []; }
  catch { toast('無法載入內容'); return; }
  if (!currentChapters.length) { toast('此作品尚無內容'); return; }
  currentChapterIdx = 0;
  // Forum posts are single-piece reads: hide chapter chrome.
  const isForum = currentNovelKind === 'forum';
  document.getElementById('reader-chapter-nav').style.display = isForum ? 'none' : '';
  document.getElementById('reader-toc-panel').style.display = isForum ? 'none' : '';
  renderToc();
  loadChapter(0);
  document.getElementById('reader-view').classList.add('open');
}

// Parse a forum-體 post into the original post (intro) + the running comments.
function renderForumContent(content) {
  const lines = content.split('\n');
  const RE = /^第\s*\d+\s*笔\s*[｜|]\s*(.+)$/;
  const intro = [];
  const comments = [];
  let cur = null;
  for (const raw of lines) {
    const m = raw.trim().match(RE);
    if (m) { cur = { name: m[1].trim(), body: [] }; comments.push(cur); }
    else if (cur) { cur.body.push(raw); }
    else { intro.push(raw); }
  }
  const introHtml = intro.filter(l => l.trim()).map(l => `<p>${escapeHtml(l)}</p>`).join('');
  const commentsHtml = comments.map(c => `
    <div class="fp-comment">
      <div class="fp-name">${escapeHtml(c.name)}</div>
      <div class="fp-body">${c.body.filter(l => l.trim()).map(l => `<p>${escapeHtml(l)}</p>`).join('')}</div>
    </div>`).join('');
  const endBox = `
    <div class="fp-end">
      <div class="fp-end-title">🕯️ 本羊皮紙已自動封存</div>
      <p>如需繼續傳閱，請滴一滴墨水。</p>
      <p>如被級長發現，請說這是魔法史筆記。</p>
    </div>`;
  return (introHtml ? `<div class="fp-intro">${introHtml}</div>` : '') +
    (comments.length ? `<div class="fp-divider">✦ ✦ ✦</div>${commentsHtml}` : '') +
    endBox;
}

function renderToc() {
  document.getElementById('reader-toc').innerHTML = currentChapters.map((c, i) =>
    `<li class="${i === currentChapterIdx ? 'current' : ''}" onclick="loadChapter(${i});document.querySelector('#reader-view details').removeAttribute('open')">${c.chapter_num}. ${c.title || '章節 ' + c.chapter_num}</li>`
  ).join('');
}

async function loadChapter(idx) {
  currentChapterIdx = idx;
  const ch = currentChapters[idx];
  document.getElementById('reader-title').textContent = currentNovelKind === 'forum'
    ? (currentNovelTitle || ch.title || '貼文')
    : (ch.title || `第 ${ch.chapter_num} 章`);
  document.getElementById('reader-ch-label').textContent = `${idx + 1} / ${currentChapters.length}`;
  document.getElementById('reader-content').innerHTML = '<div class="spinner"></div>';
  document.getElementById('prev-ch-btn').disabled = idx === 0;
  document.getElementById('next-ch-btn').disabled = idx === currentChapters.length - 1;
  renderToc();
  try {
    const full = await api(`/chapters/${ch.id}`);
    document.getElementById('reader-content').innerHTML = currentNovelKind === 'forum'
      ? renderForumContent(full.content)
      : full.content.split('\n').filter(l => l.trim()).map(l => `<p>${escapeHtml(l)}</p>`).join('');
  } catch { document.getElementById('reader-content').textContent = '載入失敗'; }
  document.getElementById('reader-view').scrollTo(0, 0);
  // save progress
  const novel = novels.find(n => n.id === currentNovelId);
  if (novel) {
    localStorage.setItem('pd_last_read', JSON.stringify({
      novelId: currentNovelId, novelTitle: novel.title,
      chapterIdx: idx, chapterId: ch.id,
      chapterTitle: ch.title || `第 ${ch.chapter_num} 章`,
    }));
    renderContinueBar();
  }
}

function renderContinueBar() {
  const raw = localStorage.getItem('pd_last_read');
  const bar = document.getElementById('continue-bar');
  if (!raw) { bar.style.display = 'none'; return; }
  const p = JSON.parse(raw);
  document.getElementById('continue-bar-text').textContent = `${p.novelTitle}・${p.chapterTitle}`;
  bar.style.display = 'flex';
}

async function resumeReading() {
  const raw = localStorage.getItem('pd_last_read');
  if (!raw) return;
  const p = JSON.parse(raw);
  currentNovelId = p.novelId;
  try { currentChapters = await api(`/chapters/novel/${p.novelId}`) || []; }
  catch { toast('無法載入章節'); return; }
  renderToc();
  const idx = currentChapters.findIndex(c => c.id === p.chapterId);
  loadChapter(idx >= 0 ? idx : p.chapterIdx);
  document.getElementById('reader-view').classList.add('open');
}

function navigateChapter(dir) {
  const next = currentChapterIdx + dir;
  if (next >= 0 && next < currentChapters.length) loadChapter(next);
}

function closeReader() { document.getElementById('reader-view').classList.remove('open'); }

// ── Forum ────────────────────────────────────────────────────
let forumPosts = [];

async function loadForumPosts() {
  const el = document.getElementById('forum-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    forumPosts = await api('/novels/?kind=forum') || [];
  } catch { forumPosts = []; }
  renderForumList();
}

function renderForumList() {
  const el = document.getElementById('forum-list');
  const q = (document.getElementById('forum-search-input').value || '').trim().toLowerCase();
  // newest first (oldest sinks to the bottom)
  let posts = [...forumPosts].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  if (q) posts = posts.filter(p => (p.title || '').toLowerCase().includes(q));
  if (!posts.length) {
    el.innerHTML = `<p style="padding:40px 8px;color:#888;text-align:center">${q ? '找不到符合的貼文' : '目前還沒有論壇貼文'}</p>`;
    return;
  }
  el.innerHTML = posts.map(p => `
    <div class="forum-post-row" onclick="openNovel('${p.id}')">
      <h4>${escapeHtml(p.title)}</h4>
      <div class="meta">
        <span>🕯️ ${p.author || '匿名'}</span>
        <span>📅 ${fmtUpdated(p.created_at)}</span>
        ${p.status === 'pending' ? '<span class="pending-tag">⏳ 待審核</span>' : ''}
      </div>
    </div>`).join('');
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

// ── Protect ──────────────────────────────────────────────────
function selectPreset(btn) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  protectPreset = btn.dataset.preset;
}

function handleProtectDrop(e) {
  e.preventDefault();
  document.getElementById('protect-drop').classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) processProtect(f);
}

function handleProtectFile(e) { if (e.target.files[0]) processProtect(e.target.files[0]); }

async function processProtect(file) {
  const bar = document.getElementById('protect-progress');
  const fill = document.getElementById('protect-fill');
  bar.style.display = ''; fill.style.width = '30%';
  const fd = new FormData();
  fd.append('image', file);
  fd.append('preset', protectPreset);
  try {
    fill.style.width = '60%';
    const res = await fetch(API + '/protect/image', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd });
    if (!res.ok) throw new Error('處理失敗');
    fill.style.width = '100%';
    const url = URL.createObjectURL(await res.blob());
    document.getElementById('protect-result-img').src = url;
    document.getElementById('protect-dl').href = url;
    document.getElementById('protect-preview').style.display = '';
  } catch (e) { toast('⚠️ ' + e.message); }
  finally { setTimeout(() => { bar.style.display = 'none'; fill.style.width = '0'; }, 800); }
}

function applyAppFontSize(scale) {
  document.documentElement.style.setProperty('--app-zoom', scale);
  localStorage.setItem('pd_app_zoom', scale);
}

// Reader-only chapter font size (reader controls)
function applyReaderFontSize(size) {
  size = Math.max(13, Math.min(28, size));
  document.documentElement.style.setProperty('--reader-font', size + 'px');
  localStorage.setItem('pd_reader_font', size);
  const lbl = document.getElementById('reader-font-label');
  if (lbl) lbl.textContent = size;
}

function stepReaderFont(delta) {
  const cur = parseInt(localStorage.getItem('pd_reader_font')) || 17;
  applyReaderFontSize(cur + delta);
}

function toggleDark(on) {

// Turn a <input type="date"> value (YYYY-MM-DD) into an ISO timestamp at noon UTC
// (noon avoids the displayed date shifting a day due to timezone).
function dateToIso(d) { return d ? `${d}T12:00:00Z` : null; }

async function submitForumPost() {
  const title = document.getElementById('forum-post-title').value.trim();
  const author = document.getElementById('forum-post-author').value.trim() || null;
  const content = document.getElementById('forum-post-content').value.trim();
  const published_at = dateToIso(document.getElementById('forum-post-date').value);
  if (!title) { toast('請輸入貼文標題'); return; }
  if (!content) { toast('請輸入貼文內文'); return; }
  try {
    const res = await api('/novels/forum', { method: 'POST', body: JSON.stringify({ title, author, content, published_at }) });
    toast(res.status === 'pending' ? '✅ 已送出，待管理員審核' : '✅ 貼文已發佈');
    document.getElementById('forum-post-title').value = '';
    document.getElementById('forum-post-author').value = '';
    document.getElementById('forum-post-date').value = '';
    document.getElementById('forum-post-content').value = '';
  } catch (e) { toast(e.message); }
}

async function loadReviewList() {
  const el = document.getElementById('admin-review-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const pending = await api('/novels/pending') || [];
    if (!pending.length) { el.innerHTML = '<p style="color:#888;padding:20px;text-align:center">目前沒有待審核的內容 ✨</p>'; return; }
    el.innerHTML = pending.map(n => `
      <div style="padding:12px 0;border-bottom:1px solid rgba(26,10,0,.1)">
        <div style="font-size:14px;font-weight:bold">${escapeHtml(n.title)}</div>
        <div style="font-size:11px;color:var(--ink-light);margin-top:3px">${n.kind === 'forum' ? '🦉 論壇貼文' : '📖 小說'}・${n.author || '匿名'}・${fmtUpdated(n.created_at)}</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button onclick="openNovel('${n.id}')" style="font-size:11px;padding:4px 12px;background:none;border:1px solid var(--gold);color:var(--ink-light);border-radius:3px;cursor:pointer">預覽</button>
          <button onclick="approveNovel('${n.id}')" style="font-size:11px;padding:4px 12px;background:#2d4a1e;border:none;color:#fff;border-radius:3px;cursor:pointer">✓ 通過</button>
          <button onclick="deleteNovel('${n.id}', true)" style="font-size:11px;padding:4px 12px;background:none;border:1px solid var(--scarlet);color:var(--scarlet);border-radius:3px;cursor:pointer">✕ 退回</button>
        </div>
      </div>`).join('');
  } catch (e) { el.innerHTML = '<p>載入失敗</p>'; }
}

async function approveNovel(id) {
  try { await api(`/novels/${id}/approve`, { method: 'PATCH' }); toast('✅ 已通過審核'); loadReviewList(); }
  catch (e) { toast(e.message); }
}

async function submitChapterText() {
  const novelId = document.getElementById('upload-novel-select').value;
  const chapterNum = parseInt(document.getElementById('upload-chapter-num').value) || 1;
  const title = document.getElementById('upload-chapter-title').value.trim() || null;
  const content = document.getElementById('upload-chapter-content').value.trim();
  if (!novelId) { toast('請先選擇作品'); return; }
  if (!content) { toast('請輸入章節內文'); return; }
  try {
    await api(`/chapters/novel/${novelId}/text`, {
      method: 'POST',
      body: JSON.stringify({ chapter_num: chapterNum, title, content }),
    });
    toast('✅ 章節已儲存');
    document.getElementById('upload-chapter-content').value = '';
    document.getElementById('upload-chapter-num').value = chapterNum + 1;
  } catch (e) { toast(e.message); }
}

async function loadAdminNovelsForUpload() {
  const sel = document.getElementById('upload-novel-select');
  try {
    const ns = await api('/novels/?kind=novel') || [];
    sel.innerHTML = '<option value="">— 選擇作品 —</option>' + ns.map(n => `<option value="${n.id}">${n.title}</option>`).join('');
  } catch {}
}

async function handleChapterUpload(e) {
  const files = Array.from(e.target.files);
  const novelId = document.getElementById('upload-novel-select').value;
  const baseNum = parseInt(document.getElementById('upload-chapter-num').value) || 1;
  const title = document.getElementById('upload-chapter-title').value.trim();
  if (!novelId) { toast('請先選擇作品'); return; }
  const queue = document.getElementById('upload-queue');
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const uid = 'uq' + Date.now() + i;
    queue.insertAdjacentHTML('beforeend', `<div class="upload-item" id="${uid}"><span class="status">⏳</span><span>${f.name}</span></div>`);
    const fd = new FormData();
    fd.append('image', f);
    fd.append('chapter_num', baseNum + i);
    if (title) fd.append('title', title);
    try {
      const res = await fetch(`${API}/chapters/novel/${novelId}/upload`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd });
      if (!res.ok) throw new Error((await res.json()).detail || 'Failed');
      document.getElementById(uid).querySelector('.status').textContent = '✅';
    } catch (err) {
      const item = document.getElementById(uid);
      item.querySelector('.status').textContent = '❌';
      item.insertAdjacentHTML('beforeend', `<small style="color:red"> ${err.message}</small>`);
    }
  }
  e.target.value = '';
}

function showCreateNovelForm() { document.getElementById('admin-novel-form').style.display = ''; }

async function createNovel() {
  const title = document.getElementById('new-novel-title').value.trim();
  if (!title) { toast('請輸入作品名稱'); return; }
  try {
    await api('/novels/', { method: 'POST', body: JSON.stringify({
      title,
      author: document.getElementById('new-novel-author').value.trim() || null,
      description: document.getElementById('new-novel-desc').value.trim() || null,
      published_at: dateToIso(document.getElementById('new-novel-date').value),
    }) });
    toast('✅ 作品已建立');
    document.getElementById('admin-novel-form').style.display = 'none';
    document.getElementById('new-novel-title').value = '';
    document.getElementById('new-novel-author').value = '';
    document.getElementById('new-novel-date').value = '';
    document.getElementById('new-novel-desc').value = '';
    loadAdminNovelList(); loadNovels();
  } catch (e) { toast(e.message); }
}

async function loadAdminNovelList() {
  const el = document.getElementById('admin-novel-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const ns = await api('/novels/') || [];
    el.innerHTML = ns.map(n => `
      <div style="padding:10px 0;border-bottom:1px solid rgba(26,10,0,.08)">
        <div style="font-size:14px;font-weight:bold">${escapeHtml(n.title)} ${n.kind === 'forum' ? '<span style="font-size:10px;color:var(--ink-light)">🦉</span>' : ''}</div>
        <div style="font-size:12px;color:var(--ink-light)">${n.author || '佚名'}</div>
        ${n.updated_at ? `<div style="font-size:11px;color:var(--ink-light);margin-top:2px">📅 最新更新 ${fmtUpdated(n.updated_at)}</div>` : ''}
        <div style="margin-top:6px;display:flex;gap:8px">
          <button onclick="openTransfer('${n.id}', this.dataset.t)" data-t="${escapeHtml(n.title)}" style="font-size:11px;padding:3px 10px;background:none;border:1px solid var(--gold);color:var(--ink-light);border-radius:3px;cursor:pointer">🔁 轉移</button>
          <button onclick="deleteNovel('${n.id}')" style="font-size:11px;padding:3px 10px;background:none;border:1px solid var(--scarlet);color:var(--scarlet);border-radius:3px;cursor:pointer">刪除</button>
        </div>
      </div>`).join('') || '<p style="color:#888">尚無作品</p>';
  } catch { el.innerHTML = '<p>載入失敗</p>'; }
}

async function openTransfer(novelId, title) {
  document.getElementById('transfer-novel-title').textContent = title || '';
  document.getElementById('transfer-modal').classList.add('open');
  const el = document.getElementById('transfer-user-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const users = await api('/permissions/users') || [];
    el.innerHTML = users.map(u => `
      <div class="user-row">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--scarlet);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;flex-shrink:0">${initials(u.username)}</div>
        <div class="u-name">${u.username}</div>
        <div class="u-role">${u.role}</div>
        <button class="perm-btn" onclick="doTransfer('${novelId}','${u.id}','${u.username}')">轉給他</button>
      </div>`).join('') || '<p style="color:#888;padding:20px">尚無用戶</p>';
  } catch { el.innerHTML = '<p>載入失敗</p>'; }
}

async function doTransfer(novelId, userId, username) {
  if (!confirm(`確定把這篇的所有權轉移給「${username}」？`)) return;
  try {
    await api(`/novels/${novelId}/transfer`, { method: 'PATCH', body: JSON.stringify({ user_id: userId }) });
    toast(`✅ 已轉移給 ${username}`);
    document.getElementById('transfer-modal').classList.remove('open');
    loadAdminNovelList();
  } catch (e) { toast(e.message); }
}

async function deleteNovel(id, isReject) {
  const msg = isReject ? '確定退回並刪除這篇待審內容？' : '確定刪除此作品及所有章節？此操作無法復原！';
  if (!confirm(msg)) return;
  try {
    await api(`/novels/${id}`, { method: 'DELETE' });
    toast(isReject ? '已退回' : '已刪除');
    if (isReject) loadReviewList(); else { loadAdminNovelList(); loadNovels(); }
  } catch (e) { toast(e.message); }
}

async function loadAdminUsers() {
  const el = document.getElementById('user-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const users = await api('/permissions/users') || [];
    const ROLES = [['reader','📚 讀者'],['writer','✍️ 作家'],['admin','🏰 管理員'],['super_admin','👑 超級管理員']];
    const isSuper = currentUser.role === 'super_admin';
    el.innerHTML = users.map(u => {
      const isSelf = u.id === currentUser.id;
      const picker = (isSuper && !isSelf)
        ? `<select onchange="changeUserRole('${u.id}','${u.username}',this.value)" style="font-size:12px;padding:4px 6px;border:1px solid var(--gold-lt);border-radius:3px;background:var(--parchment2);color:var(--ink)">
             ${ROLES.map(([v,l]) => `<option value="${v}" ${u.role===v?'selected':''}>${l}</option>`).join('')}
           </select>`
        : `<div class="u-role">${u.role}${isSelf ? '（你）' : ''}</div>`;
      return `
      <div class="user-row">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--scarlet);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:14px;flex-shrink:0">${initials(u.username)}</div>
        <div class="u-name">${u.username}</div>
        ${picker}
      </div>`;
    }).join('') || '<p style="color:#888;padding:20px">尚無用戶</p>';
  } catch { el.innerHTML = '<p>載入失敗</p>'; }
}

async function changeUserRole(userId, username, role) {
  if (!confirm(`確定把「${username}」的角色改成 ${role}？`)) { loadAdminUsers(); return; }
  try {
    await api(`/permissions/users/${userId}/role`, { method: 'PATCH', body: JSON.stringify({ role }) });
    toast(`✅ ${username} 已設為 ${role}`);
    loadAdminUsers();
  } catch (e) { toast(e.message); loadAdminUsers(); }
}

async function openPerm(userId, username) {
  document.getElementById('perm-user-name').textContent = username;
  document.getElementById('perm-modal').classList.add('open');
  const el = document.getElementById('perm-novel-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const [allNovels, userPerms] = await Promise.all([
      api('/novels/'),
      api(`/permissions/novel/${userId}`).catch(() => []),
    ]);
    const grantedIds = new Set((userPerms || []).map(p => p.novel_id));
    el.innerHTML = (allNovels || []).map(n => `
      <div class="perm-novel-row">
        <label>${n.title}</label>
        <label class="toggle">
          <input type="checkbox" ${grantedIds.has(n.id) ? 'checked' : ''} onchange="togglePerm('${userId}','${n.id}',this.checked)" />
          <span class="slider"></span>
        </label>
      </div>`).join('') || '<p>尚無作品</p>';
  } catch { el.innerHTML = '<p>載入失敗</p>'; }
}

async function togglePerm(userId, novelId, grant) {
  try {
    if (grant) await api('/permissions/grant', { method: 'POST', body: JSON.stringify({ user_id: userId, novel_id: novelId }) });
    else await api('/permissions/revoke', { method: 'DELETE', body: JSON.stringify({ user_id: userId, novel_id: novelId }) });
    toast(grant ? '✅ 已授權' : '已撤銷');
  } catch (e) { toast(e.message); }
}

function closePerm() { document.getElementById('perm-modal').classList.remove('open'); }

// ── Admin: role badge helper ──────────────────────────────────
const ROLE_LABEL = { super_admin: '👑 最高管理員', admin: '🏰 管理員', writer: '✍️ 作家', reader: '📚 讀者' };

function renderSettings() {
  document.getElementById('settings-avatar').textContent = currentUser.username ? currentUser.username[0].toUpperCase() : '🧙';
  document.getElementById('settings-username').textContent = currentUser.username || '巫師';
  document.getElementById('settings-email').textContent = '';
  document.getElementById('settings-role').textContent = ROLE_LABEL[currentUser.role] || currentUser.role;
}

// ── Admin: invites ────────────────────────────────────────────
async function generateInvite(role) {
  try {
    const res = await api('/invites/generate', { method: 'POST', body: JSON.stringify({ role }) });
    const link = `${window.location.origin}${window.location.pathname}?invite=${res.token}`;
    document.getElementById('invite-link-box').value = link;
    document.getElementById('invite-result').style.display = '';
    loadInviteList();
  } catch (e) { toast('⚠️ ' + e.message); }
}

function copyInviteLink() {
  const box = document.getElementById('invite-link-box');
  navigator.clipboard.writeText(box.value).then(() => toast('✅ 已複製到剪貼簿'));
}

async function loadInviteList() {
  const el = document.getElementById('invite-list');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const list = await api('/invites/list') || [];
    if (!list.length) { el.innerHTML = '<p style="color:#888;font-size:13px">尚無邀請連結</p>'; return; }
    el.innerHTML = list.map(inv => {
      const used = !!inv.used_at;
      const usedBy = inv.profiles?.username || '';
      const expires = new Date(inv.expires_at).toLocaleDateString('zh-TW');
      return `<div style="padding:10px 0;border-bottom:1px solid rgba(26,10,0,.08);font-size:13px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="background:${used ? '#ccc' : 'var(--scarlet)'};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px">${ROLE_LABEL[inv.role] || inv.role}</span>
          <span style="color:${used ? '#aaa' : 'var(--ink-light)'}">到期：${expires}</span>
          ${used ? `<span style="color:#aaa">✓ 已使用（${usedBy}）</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <code style="font-size:10px;color:#888;word-break:break-all;flex:1">${inv.token}</code>
          ${!used ? `<button onclick="revokeInvite('${inv.id}')" style="font-size:11px;padding:3px 8px;background:none;border:1px solid #ccc;border-radius:3px;cursor:pointer;white-space:nowrap">撤銷</button>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch { el.innerHTML = '<p style="color:#888">載入失敗</p>'; }
}

async function revokeInvite(id) {
  try { await api(`/invites/${id}`, { method: 'DELETE' }); toast('已撤銷'); loadInviteList(); }
  catch (e) { toast(e.message); }
}

// ── Boot ─────────────────────────────────────────────────────
(async () => {
  const appZoom = localStorage.getItem('pd_app_zoom');
  if (appZoom) { document.getElementById('font-size-select').value = appZoom; applyAppFontSize(appZoom); }
  const readerFs = localStorage.getItem('pd_reader_font');
  if (readerFs) applyReaderFontSize(parseInt(readerFs)); else applyReaderFontSize(17);
  if (localStorage.getItem('pd_dark') === '1') { document.getElementById('dark-toggle').checked = true; toggleDark(true); }

  // Check for invite token in URL
  const inviteToken = new URLSearchParams(window.location.search).get('invite');
  if (inviteToken) {
    try {
      const res = await api(`/invites/validate/${inviteToken}`);
      const roleLabels = { reader: '📚 讀者', writer: '✍️ 作家+讀者', admin: '🏰 管理員' };
      document.getElementById('invite-role-badge').textContent = `身份：${roleLabels[res.role] || res.role}`;
      document.getElementById('signin-form').style.display = 'none';
      document.getElementById('invite-form').style.display = '';
    } catch (e) {
      document.getElementById('signin-form').style.display = 'none';
      document.getElementById('invite-invalid-msg').textContent = e.message || '此邀請連結已失效';
      document.getElementById('invite-invalid').style.display = '';
    }
    return; // don't auto-login, show invite UI
  }

  if (token) await initApp();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./service-worker.js').catch(() => {});
})();
</script>
