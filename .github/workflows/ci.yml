name: CI (compile + security tests)

# Runs on every push/PR to main: compiles all backend Python and runs the security /
# output-safety test suite (tests/). Fast gate so a regression in avatar validation, the
# XSS-encoding sinks, or the APP_VERSION/CACHE_NAME match can't slip in unnoticed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile all backend Python
        run: python -m py_compile main.py deps.py monitor.py config.py routers/*.py
      - name: Security + output-safety tests
        run: python -m unittest discover -s tests -p 'test_*.py' -v
