name: CI (frontend syntax + output-safety tests)

# 這個 repo 只放前端。後端（FastAPI）已移到私有 repo surf0912/prophet-daily-api，
# 由該 repo 的 CI 負責 py_compile、pip-audit、後端安全測試（它會 clone 這裡的前端一起測）。
#
# 這裡跑的是快速前端閘門：JS 語法，以及純靜態的輸出安全檢查
# （XSS 編碼沉澱點、CSP 無 inline/eval、data-on handler 全在白名單、
#  APP_VERSION 必須等於 service-worker.js 的 CACHE_NAME）。

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check frontend JavaScript syntax
        run: |
          node --check app.js
          node --check safe-events.js
          node --check zhconv.js
          node --check service-worker.js
      - name: Output-safety tests (stdlib only, no dependencies)
        run: python -m unittest discover -s tests -p 'test_*.py' -v
