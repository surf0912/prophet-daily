name: 每週資料庫備份 (DB backup)

# Full disaster-recovery backup: pg_dump of the WHOLE database (content + auth/passwords),
# gzipped and AES256-encrypted, stored as a 90-day GitHub artifact. Encryption means the dump
# is safe even if this repo is public (artifacts on public repos are downloadable by anyone).
#
# One-time setup — add two repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL    Supabase → Connect → "Session pooler" connection string (IPv4, pg_dump-able),
#                      e.g. postgresql://postgres.<ref>:<DB-PASSWORD>@aws-0-<region>.pooler.supabase.com:5432/postgres
#   BACKUP_PASSPHRASE  any long passphrase you keep safe — needed to DECRYPT the backup later
#
# Restore later:  gpg -d db-XXXX.sql.gz.gpg | gunzip | psql '<DB_URL>'   (gpg will prompt for the passphrase)

on:
  schedule:
    - cron: '0 19 */2 * *'   # 每 2 天 19:00 UTC = 隔天 03:00 台灣時間
  workflow_dispatch: {}        # 也可在 Actions 頁面手動執行一次

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump (postgres:17 via Docker) → gzip → encrypt
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          [ -n "${DB_URL:-}" ]     || { echo "::error::SUPABASE_DB_URL secret is empty"; exit 1; }
          [ -n "${PASSPHRASE:-}" ] || { echo "::error::BACKUP_PASSPHRASE secret is empty"; exit 1; }
          ts=$(date -u +%Y%m%d-%H%M)
          # pg_dump from an official postgres:17 image — no apt install / PATH / version headaches.
          docker run --rm -e PGCONNECT_TIMEOUT=30 postgres:17-alpine \
            pg_dump "$DB_URL" --no-owner --no-privileges | gzip > "db-$ts.sql.gz"
          # gpg 2.x needs loopback to take a passphrase non-interactively.
          gpg --batch --yes --pinentry-mode loopback --passphrase "$PASSPHRASE" \
              --symmetric --cipher-algo AES256 "db-$ts.sql.gz"
          rm -f "db-$ts.sql.gz"
          ls -lh db-*.sql.gz.gpg

      - name: Upload encrypted backup (14-day artifact)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: '*.sql.gz.gpg'
          retention-days: 14
